<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Self Assessment - AI Career Guide</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-custom sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <i class="bi bi-cpu text-primary glow-text-indigo"></i>
        <span>AI Career Guide</span>
      </a>
      <a href="/" class="btn btn-premium btn-premium-secondary py-2 px-3 small">
        <i class="bi bi-house"></i> Dashboard
      </a>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="container mt-5 py-4 animate-fade-in" style="max-width: 800px;">
    <div class="card glass-card p-4 p-md-5">

      <div class="text-center mb-5">
        <div class="fs-1 text-emerald mb-2">
          <i class="bi bi-list-check glow-text-emerald"></i>
        </div>
        <h2 class="fw-bold mb-1 text-gradient-emerald">🧠 Skill Self Assessment</h2>
        <h5 class="text-muted mt-2">Job Role: <span class="text-main">{{ role }}</span></h5>
      </div>

      <hr class="my-4" style="border-color: var(--border-color)">

      <form action="/final-report" method="post">
        <input type="hidden" name="role" value="{{ role }}">

        <h6 class="fw-bold mb-3 text-muted small text-uppercase tracking-wider">Select the skills you know:</h6>

        <div class="row g-2 mb-4">
          {% for skill in skills %}
          <div class="col-md-6">
            <label class="checklist-item w-100 mb-0">
              <input type="checkbox" name="known_skills" value="{{ skill }}">
              <div class="checklist-label">
                <span class="custom-checkbox-box">
                  <svg viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                  </svg>
                </span>
                <span class="text-main fs-6">{{ skill }}</span>
              </div>
            </label>
          </div>
          {% endfor %}
        </div>

        <button type="submit" class="btn-premium btn-premium-emerald w-100 py-3 mt-4">
          <span>Generate Final Report</span>
          <i class="bi bi-file-earmark-diff"></i>
        </button>
      </form>

      <a href="/" class="btn-premium btn-premium-secondary w-100 py-3 mt-3">
        <i class="bi bi-arrow-left"></i>
        <span>Cancel & Back</span>
      </a>

    </div>
  </div>

  <!-- Footer -->
  <footer class="footer-custom mt-5">
    <div class="container text-center">
      <p class="mb-0 small text-muted">&copy; 2026 AI Career Guide. All rights reserved.</p>
    </div>
  </footer>

</body>

</html>
