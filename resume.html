<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Analyzer - AI Career Guide</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-custom sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <i class="bi bi-cpu text-primary glow-text-indigo"></i>
        <span>AI Career Guide</span>
      </a>
      <a href="/" class="btn btn-premium btn-premium-secondary py-2 px-3 small">
        <i class="bi bi-house"></i> Dashboard
      </a>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="container mt-5 py-4 animate-fade-in" style="max-width: 800px;">
    <div class="card glass-card p-4 p-md-5">

      <div class="text-center mb-5">
        <div class="fs-1 text-cyan mb-2">
          <i class="bi bi-file-earmark-bar-graph-fill glow-text-cyan"></i>
        </div>
        <h2 class="fw-bold text-gradient-cyan">📄 Resume Analyzer Engine</h2>
        <p class="text-muted">Compare your resume against role expectations to calculate readiness and identify skill
          gaps.</p>
      </div>

      <form method="post" enctype="multipart/form-data" class="needs-validation" novalidate>

        <!-- Job Role Selection -->
        <div class="mb-4">
          <label for="job-role" class="form-label fw-semibold text-muted small text-uppercase mb-2">Target Job
            Role</label>
          <select name="job_role" class="form-select form-select-custom w-100" id="job-role" required>
            <option value="">-- Select Target Job Role --</option>
            <option value="Software Developer">Software Developer</option>
            <option value="Data Scientist">Data Scientist</option>
            <option value="UI/UX Designer">UI/UX Designer</option>
          </select>
        </div>

        <!-- File Upload Area -->
        <div class="mb-4">
          <label class="form-label fw-semibold text-muted small text-uppercase mb-2">Upload Resume (PDF)</label>
          <div class="upload-container" id="drop-zone">
            <i class="bi bi-cloud-arrow-up-fill upload-icon"></i>
            <h5 class="fw-600 text-main mb-1" id="upload-filename">Drag and drop file here</h5>
            <p class="text-muted small mb-0">PDF format recommended, max size 5MB</p>
            <input type="file" name="resume" class="form-control" id="resume-file" required accept=".pdf"
              onchange="displayFileName()">
          </div>
        </div>

        <button type="submit" class="btn-premium btn-premium-cyan w-100 py-3 mt-4">
          <span>Start Resume Audit</span>
          <i class="bi bi-lightning-charge"></i>
        </button>
      </form>

      <a href="/" class="btn-premium btn-premium-secondary w-100 py-3 mt-3">
        <i class="bi bi-arrow-left"></i>
        <span>Cancel & Back</span>
      </a>

    </div>
  </div>

  <!-- Footer -->
  <footer class="footer-custom mt-5">
    <div class="container text-center">
      <p class="mb-0 small text-muted">&copy; 2026 AI Career Guide. All rights reserved.</p>
    </div>
  </footer>

  <script>
    function displayFileName() {
      const fileInput = document.getElementById('resume-file');
      const filenameLabel = document.getElementById('upload-filename');
      const dropZone = document.getElementById('drop-zone');

      if (fileInput.files.length > 0) {
        filenameLabel.innerText = fileInput.files[0].name;
        dropZone.style.borderColor = 'var(--emerald-color)';
        dropZone.style.background = 'rgba(16, 185, 129, 0.05)';
      }
    }
  </script>

</body>

</html>
