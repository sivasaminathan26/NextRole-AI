<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Quiz - AI Career Guide</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-custom sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-cpu text-primary glow-text-indigo"></i>
                <span>AI Career Guide</span>
            </a>
            <a href="/" class="btn btn-premium btn-premium-secondary py-2 px-3 small">
                <i class="bi bi-house"></i> Dashboard
            </a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mt-5 py-4 animate-fade-in" style="max-width: 800px;">
        <div class="card glass-card p-4 p-md-5">

            <div class="text-center mb-5">
                <div class="fs-1 text-primary mb-2">
                    <i class="bi bi-compass-fill glow-text-indigo"></i>
                </div>
                <h2 class="fw-bold text-gradient">🎯 Career Assessment Quiz</h2>
                <p class="text-muted">Select your primary interest interest area to analyze suitable career
                    trajectories.</p>
            </div>

            <form method="post">
                <h5 class="fw-bold mb-4 text-muted small text-uppercase tracking-wider">Choose your alignment:</h5>

                <div class="row g-3 mb-4">

                    <!-- Coding Option -->
                    <div class="col-md-4">
                        <label class="ui-selector-card w-100">
                            <input type="radio" name="interest" value="coding" checked>
                            <div class="selector-inner text-center">
                                <span class="selector-icon">💻</span>
                                <h4 class="selector-title">Coding</h4>
                                <p class="selector-desc">Creating software, logic design, and web programming.</p>
                            </div>
                        </label>
                    </div>

                    <!-- Maths Option -->
                    <div class="col-md-4">
                        <label class="ui-selector-card w-100">
                            <input type="radio" name="interest" value="maths">
                            <div class="selector-inner text-center">
                                <span class="selector-icon">📊</span>
                                <h4 class="selector-title">Analytics</h4>
                                <p class="selector-desc">Puzzles, statistical models, and pattern mining.</p>
                            </div>
                        </label>
                    </div>

                    <!-- Design Option -->
                    <div class="col-md-4">
                        <label class="ui-selector-card w-100">
                            <input type="radio" name="interest" value="design">
                            <div class="selector-inner text-center">
                                <span class="selector-icon">🎨</span>
                                <h4 class="selector-title">Design</h4>
                                <p class="selector-desc">Aesthetics, prototyping, and user experience flow.</p>
                            </div>
                        </label>
                    </div>

                </div>

                <button type="submit" class="btn-premium btn-premium-indigo w-100 py-3 mt-2">
                    <span>Evaluate Match</span>
                    <i class="bi bi-activity"></i>
                </button>
            </form>

            <a href="/" class="btn-premium btn-premium-secondary w-100 py-3 mt-3">
                <i class="bi bi-arrow-left"></i>
                <span>Cancel & Back</span>
            </a>

        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-custom mt-5">
        <div class="container text-center">
            <p class="mb-0 small text-muted">&copy; 2026 AI Career Guide. All rights reserved.</p>
        </div>
    </footer>

</body>

</html>
